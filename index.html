<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7VQM8M7V9N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-7VQM8M7V9N');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="assets/imgs/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="assets/imgs/favicon.svg" />
  <link rel="shortcut icon" href="assets/imgs/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/imgs/apple-touch-icon.png" />
  <link rel="manifest" href="assets/imgs/site.webmanifest" />
  <title>꿀맵 — 개꿀 할인과 행사 정보 지도</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script type="text/javascript"
    src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=5harbulyju&submodules=geocoder"></script>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    #map { width: 100%; height: 100%; }
    .category-tab.active { background-color: #ffffff; color: #0172FE; border-color: #0172FE; }
    .category-tab:not(.active) { background-color: #0172FE; color: #ffffff; border-color: #0172FE; }
    #category-bar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-100">

  <!-- 지도 -->
  <div id="map"></div>

  <!-- 상단 바 (타이틀 + 카테고리 필터) -->
  <div class="fixed top-0 left-0 right-0 z-10 bg-white shadow-sm py-2 px-2 flex items-center gap-2">
    <div class="flex-shrink-0 flex flex-col leading-none">
      <span class="text-[12px] text-[#0172FE] font-medium tracking-tight">대한민국 개꿀템 모음</span>
      <div class="flex items-center gap-1">
        <img src="assets/imgs/favicon-96x96.png" alt="꿀맵" class="w-5 h-5">
        <span class="font-extrabold text-[#0172FE] text-base tracking-tight">꿀맵</span>
      </div>
    </div>
    <div id="category-bar" class="flex gap-2 overflow-x-auto">
      <button data-id="" onclick="AppState.selectCategory(null)"
        class="category-tab active flex-shrink-0 text-xs font-medium px-3 py-1.5 rounded-full border border-[#0172FE] whitespace-nowrap">
        전체
      </button>
      <!-- 카테고리 탭 동적 삽입 -->
    </div>
  </div>

  <!-- 행사 상세 팝업 -->
  <div id="detail-modal" class="hidden fixed inset-0 z-30 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/50" onclick="closeDetailPanel()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm max-h-[80vh] overflow-y-auto">
      <button onclick="closeDetailPanel()"
        class="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 z-10">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
      <div id="detail-content" class="px-4 pt-4 pb-6 pr-12"></div>
    </div>
  </div>

  <!-- 행사 등록 팝업 -->
  <div id="submit-panel" class="hidden fixed inset-0 z-30 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/50" onclick="closeSubmitPanel()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col">
      <div class="flex items-center justify-between px-4 py-3 border-b flex-shrink-0">
        <h2 class="text-lg font-bold">행사 정보 등록</h2>
        <button onclick="closeSubmitPanel()"
          class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div id="submit-form-content" class="px-4 py-4 overflow-y-auto flex-1"></div>
    </div>
  </div>

  <!-- FAB 버튼 -->
  <button onclick="openSubmitPanel()"
    class="fixed bottom-6 right-4 z-20 bg-[#0172FE] text-white px-5 py-3 rounded-full shadow-lg font-bold text-sm whitespace-nowrap">
    🍯 개꿀 행사 등록하기
  </button>

  <!-- 신고 모달 -->
  <div id="report-modal" class="hidden fixed inset-0 z-40 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/50" onclick="closeReportModal()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm p-5 z-10">
      <h3 class="font-bold text-base mb-3">신고 사유를 선택해주세요</h3>
      <div id="report-form-content"></div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/map.js"></script>
  <script src="assets/js/submit.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
