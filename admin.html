<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoneyMap 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 로그인 화면 -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <h1 class="text-2xl font-bold text-center mb-1 text-[#0172FE]">🍯 HoneyMap</h1>
      <p class="text-center text-gray-400 text-sm mb-6">관리자 로그인</p>
      <input id="login-username" type="text" placeholder="아이디"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#0172FE]">
      <input id="login-password" type="password" placeholder="비밀번호"
        onkeydown="if(event.key==='Enter') Admin.login()"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-1 text-sm focus:outline-none focus:ring-2 focus:ring-[#0172FE]">
      <p id="login-error" class="hidden text-red-500 text-xs mb-3 mt-1"></p>
      <div class="mt-4">
        <button onclick="Admin.login()"
          class="w-full bg-[#0172FE] text-white py-3 rounded-xl font-bold text-sm">
          로그인
        </button>
      </div>
    </div>
  </div>

  <!-- 관리자 메인 -->
  <div id="admin-main" class="hidden">
    <header class="bg-white shadow-sm sticky top-0 z-10">
      <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
        <h1 class="text-lg font-bold text-[#0172FE]">🍯 HoneyMap 관리자</h1>
        <button onclick="Admin.logout()" class="text-sm text-gray-400 hover:text-gray-600">로그아웃</button>
      </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 py-6">
      <!-- 탭 네비게이션 -->
      <div class="flex gap-1 mb-6 bg-gray-100 p-1 rounded-xl w-fit flex-wrap">
        <button onclick="Admin.showTab('dashboard')"  data-tab="dashboard"
          class="admin-tab px-4 py-2 rounded-lg text-sm font-medium text-gray-600">대시보드</button>
        <button onclick="Admin.showTab('events')"     data-tab="events"
          class="admin-tab px-4 py-2 rounded-lg text-sm font-medium text-gray-600">행사 목록</button>
        <button onclick="Admin.showTab('reports')"    data-tab="reports"
          class="admin-tab px-4 py-2 rounded-lg text-sm font-medium text-gray-600">신고 관리</button>
        <button onclick="Admin.showTab('categories')" data-tab="categories"
          class="admin-tab px-4 py-2 rounded-lg text-sm font-medium text-gray-600">카테고리</button>
      </div>

      <!-- 탭 콘텐츠 -->
      <div id="tab-dashboard"  class="tab-content"></div>
      <div id="tab-events"     class="tab-content hidden"></div>
      <div id="tab-reports"    class="tab-content hidden"></div>
      <div id="tab-categories" class="tab-content hidden"></div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
